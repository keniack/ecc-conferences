name: Conference Submission

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-conference-pr:
    if: contains(github.event.issue.body || '', '<!-- conference-submission -->') && github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-conference-agent.txt

      - name: Parse issue and update conference data
        id: submission
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gemini-2.5-flash' }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
        run: |
          python scripts/conference_submission_pr.py \
            --event-path "$GITHUB_EVENT_PATH" \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --report-file .github/conference-submission-report.md

      - name: Comment on invalid submission
        if: steps.submission.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "The conference submission could not be converted into a pull request automatically. Check the workflow run for validation details."
            });

      - name: Stop after invalid submission
        if: steps.submission.outcome == 'failure'
        run: exit 1

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- _data/conferences.yaml; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: pull-request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: add conference from issue #${{ github.event.issue.number }}"
          branch: automation/conference-submission-${{ github.event.issue.number }}
          delete-branch: true
          title: "chore: ${{ github.event.issue.title }}"
          body-path: .github/conference-submission-report.md
          labels: |
            automation
            conferences

      - name: Comment with pull request link
        if: steps.pull-request.outputs.pull-request-number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = `${{ steps.pull-request.outputs.pull-request-number }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Created or updated PR #${prNumber} for this conference submission.`
            });
