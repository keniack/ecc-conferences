name: Conference Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-conference-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-conference-agent.txt

      - name: Run conference agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
        run: |
          python scripts/conference_agent.py \
            --write \
            --search-fallback \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --report-file .github/conference-agent-report.md

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- _data/conferences.yaml; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: refresh conference metadata"
          branch: automation/conference-agent
          delete-branch: true
          title: "chore: refresh conference metadata"
          body-path: .github/conference-agent-report.md
          labels: |
            automation
            conferences
